AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: "ex4-2 \u2014 SAM Local Testing Ex4-1 extended with a NotesFunction and\
  \ a DynamoDB table resource.\n"
Globals:
  Function:
    Runtime: python3.13
    Timeout: 10
Resources:
  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: HelloWorldFunction
      Handler: app.lambda_handler
      Environment:
        Variables:
          INSTRUCTOR_NAME: Instructor
      Events:
        HelloWorldApi:
          Type: Api
          Properties:
            Path: /hello
            Method: GET
    Metadata:
      SamResourceId: HelloWorldFunction
  GoodbyeFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: GoodbyeFunction
      Handler: app.lambda_handler
      Events:
        GoodbyeApi:
          Type: Api
          Properties:
            Path: /goodbye
            Method: GET
    Metadata:
      SamResourceId: GoodbyeFunction
  NotesFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: NotesFunction
      Handler: app.lambda_handler
      Policies:
      - DynamoDBCrudPolicy:
          TableName:
            Ref: NotesTable
      Environment:
        Variables:
          NOTES_TABLE:
            Ref: NotesTable
      Events:
        NotesApi:
          Type: Api
          Properties:
            Path: /notes
            Method: POST
    Metadata:
      SamResourceId: NotesFunction
  NotesTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      PrimaryKey:
        Name: Id
        Type: String
Outputs:
  ApiGatewayEndpoint:
    Description: API Gateway endpoint URL for the dev stage
    Value:
      Fn::Sub: https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/Prod/
